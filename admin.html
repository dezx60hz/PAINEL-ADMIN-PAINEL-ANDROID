<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add User</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --secondary: #1d4ed8;
      --accent: #06b6d4;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #0f172a;
      --gray: #94a3b8;
      --light-gray: #1e293b;
      --white: #ffffff;
      --card-bg: rgba(30, 41, 59, 0.8);
      --border: rgba(99, 102, 241, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); color: #e2e8f0; line-height: 1.6; min-height: 100vh; }
    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }

    .header { background: linear-gradient(90deg, #1e293b, #312e81); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); padding: 15px 0; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
    .header .container { display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .header-title { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 10px; color: #fff; }
    .header-actions { display: flex; align-items: center; gap: 15px; }

    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 6px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; border: none; background-color: transparent; color: #e2e8f0; }
    .btn-icon { width: 36px; height: 36px; border-radius: 50%; }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #7c3aed); color: #fff; }
    .btn-primary:hover { background: linear-gradient(135deg, #1d4ed8, #6d28d9); transform: translateY(-1px); }
    .btn-block { width: 100%; padding: 12px; font-size: 1rem; }

    .sidebar { position: fixed; top: 70px; left: 0; bottom: 0; width: 250px; background: linear-gradient(180deg, #1e293b, #0f172a); box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3); transition: all 0.3s ease; z-index: 900; border-right: 1px solid var(--border); }
    .sidebar.active { left: -250px; }
    .sidebar-menu { list-style: none; padding: 15px 0; }
    .sidebar-item { margin-bottom: 5px; }
    .sidebar-link { display: flex; align-items: center; padding: 12px 20px; color: var(--gray); text-decoration: none; transition: all 0.3s ease; gap: 10px; border-radius: 0 8px 8px 0; margin-right: 10px; }
    .sidebar-link:hover, .sidebar-link.active { background: linear-gradient(90deg, rgba(37, 99, 235, 0.2), transparent); color: #60a5fa; border-left: 3px solid #2563eb; }
    .sidebar-link.active { font-weight: 500; }

    .main-content { margin-top: 70px; margin-left: 250px; padding: 20px; transition: all 0.3s ease; }
    .main-content.full-width { margin-left: 0; }

    .card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
    .form-group { margin-bottom: 20px; }
    .label { display: block; margin-bottom: 8px; font-weight: 500; color: #cbd5e1; }
    .form-control { width: 100%; padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; transition: all 0.3s ease; background: rgba(15, 23, 42, 0.6); color: #e2e8f0; }
    .form-control:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3); }

    .password-container { position: relative; }
    .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray); }

    .form-check { display: flex; align-items: center; gap: 8px; }
    .form-check-input { width: 18px; height: 18px; accent-color: #2563eb; }
    .form-check-label { user-select: none; color: #cbd5e1; }
    .radio-group { display: flex; gap: 20px; }

    .form-result { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; }
    .form-result.success { background-color: rgba(16, 185, 129, 0.15); color: #10b981; }
    .form-result.error { background-color: rgba(239, 68, 68, 0.15); color: #ef4444; }

    .rounded-circle { border-radius: 50%; }
    .maintenance-warning { background: linear-gradient(90deg, rgba(245, 158, 11, 0.2), rgba(239, 68, 68, 0.1)); color: #f59e0b; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: 500; border: 1px solid rgba(245, 158, 11, 0.3); }

    @media (max-width: 768px) { .sidebar { left: -250px; } .sidebar.active { left: 0; } .main-content { margin-left: 0; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-left">
        <button class="btn btn-icon" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <h1 class="header-title"><i class="fas fa-user-plus"></i><span>Add New User</span></h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-icon"><i class="fas fa-bell"></i></button>
        <img src="/logo.png" alt="Admin" width="40" height="40" class="rounded-circle" onerror="this.src='https://via.placeholder.com/40'">
      </div>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <ul class="sidebar-menu">
      <li class="sidebar-item"><a href="index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
      <li class="sidebar-item"><a href="admin.html" class="sidebar-link active"><i class="fas fa-user-plus"></i><span>Add User</span></a></li>
      <li class="sidebar-item"><a href="bulk-generate.html" class="sidebar-link"><i class="fas fa-key"></i><span>Bulk Generate</span></a></li>
      <li class="sidebar-item"><a href="dashboard.html" class="sidebar-link"><i class="fas fa-users-cog"></i><span>Manage Users</span></a></li>
      <li class="sidebar-item"><a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i><span>Settings</span></a></li>
    </ul>
  </aside>

  <main class="main-content" id="mainContent">
    <div class="container">
      <div id="maintenanceWarning" class="maintenance-warning" style="display: none;">
        <i class="fas fa-exclamation-triangle"></i> Site is currently in Maintenance Mode.
      </div>
      <div class="card">
        <form id="addUserForm">
          <div class="form-group">
            <label for="username" class="label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Ex: DVAMODS_USER" required>
          </div>
          <div class="form-group">
            <label for="password" class="label">Password</label>
            <div class="password-container">
              <input type="password" id="password" class="form-control" value="vip" required>
              <button type="button" class="btn btn-icon toggle-password"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="form-group">
            <label for="days" class="label">Validity (Days)</label>
            <input type="number" id="days" class="form-control" value="30" min="1" required>
            <small style="color:var(--gray)">Automatic activation on first use (2099 logic).</small>
          </div>
          <div class="form-group">
            <label class="label">Status</label>
            <div class="form-check">
              <input type="checkbox" id="statusCheckbox" class="form-check-input" checked>
              <label for="statusCheckbox" class="form-check-label">Active User</label>
            </div>
          </div>
          <div class="form-group">
            <label class="label">Device Access</label>
            <div class="radio-group">
              <div class="form-check">
                <input type="radio" id="device1" name="access" value="1" class="form-check-input" checked>
                <label for="device1" class="form-check-label">1 Device</label>
              </div>
              <div class="form-check">
                <input type="radio" id="deviceUnlimited" name="access" value="∞" class="form-check-input">
                <label for="deviceUnlimited" class="form-check-label">Unlimited</label>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label for="credit" class="label">Seller's Credit</label>
            <select id="credit" class="form-control" required>
              <option value="10">10 Credits</option>
              <option value="20">20 Credits</option>
              <option value="30">30 Credits</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-user-plus"></i> Add User</button>
          <div id="result" class="form-result"></div>
        </form>
      </div>
    </div>
  </main>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    sidebarToggle.addEventListener('click', () => { sidebar.classList.toggle('active'); mainContent.classList.toggle('full-width'); });

    const togglePassword = document.querySelector('.toggle-password');
    const passwordInput = document.getElementById('password');
    togglePassword.addEventListener('click', () => {
      const icon = togglePassword.querySelector('i');
      if (passwordInput.type === 'password') { passwordInput.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
      else { passwordInput.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
    });

    const addUserForm = document.getElementById('addUserForm');
    const resultEl = document.getElementById('result');

    addUserForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const days = parseInt(document.getElementById('days').value);
      const isActive = document.getElementById('statusCheckbox').checked;
      const credit = document.getElementById('credit').value;
      const access = document.querySelector('input[name="access"]:checked').value;
      const status = isActive ? 'active' : 'inactive';

      if (!username || !password || !days) { showResult('Please fill all fields', 'error'); return; }

      const pad = n => n.toString().padStart(2, '0');
      const h = Math.floor(days / 60);
      const m = days % 60;
      const validity2099 = `01-01-2099 ${pad(h)}:${pad(m)}`;
      const now = new Date();
      const rgtime = `${pad(now.getDate())}-${pad(now.getMonth()+1)}-${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

      set(ref(db, `userinfo/${username}`), {
        username, password, status, validity: validity2099, access, device: 'null', rgtime, credit
      }).then(() => { showResult('User added successfully!', 'success'); addUserForm.reset(); document.getElementById('password').value = "vip"; })
        .catch((error) => { showResult('Error: ' + error.message, 'error'); });
    });

    function showResult(message, type) {
      resultEl.textContent = message;
      resultEl.className = `form-result ${type}`;
      setTimeout(() => { resultEl.textContent = ''; resultEl.className = 'form-result'; }, 3000);
    }

    const maintenanceWarning = document.getElementById('maintenanceWarning');
    onValue(ref(db, 'settings/maintenanceMode'), (snapshot) => {
      maintenanceWarning.style.display = snapshot.val() ? 'block' : 'none';
    });
  </script>
</body>
</html>
