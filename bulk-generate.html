<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk Generate Keys</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --secondary: #1d4ed8;
      --accent: #06b6d4;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #0f172a;
      --gray: #94a3b8;
      --card-bg: rgba(30, 41, 59, 0.8);
      --border: rgba(99, 102, 241, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); color: #e2e8f0; line-height: 1.6; min-height: 100vh; }
    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }

    .header { background: linear-gradient(90deg, #1e293b, #312e81); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); padding: 15px 0; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
    .header .container { display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .header-title { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 10px; color: #fff; }

    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; border-radius: 8px; font-weight: 500; cursor: pointer; border: none; width: 100%; background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; gap: 8px; transition: all 0.3s; }
    .btn:hover { background: linear-gradient(135deg, #1d4ed8, #6d28d9); transform: translateY(-1px); }
    .btn-success { background: linear-gradient(135deg, #10b981, #06b6d4); }
    .btn-success:hover { background: linear-gradient(135deg, #059669, #0891b2); }

    .sidebar { position: fixed; top: 70px; left: 0; bottom: 0; width: 250px; background: linear-gradient(180deg, #1e293b, #0f172a); box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3); transition: all 0.3s ease; z-index: 900; border-right: 1px solid var(--border); }
    .sidebar.active { left: -250px; }
    .sidebar-menu { list-style: none; padding: 15px 0; }
    .sidebar-item { margin-bottom: 5px; }
    .sidebar-link { display: flex; align-items: center; padding: 12px 20px; color: var(--gray); text-decoration: none; transition: all 0.3s ease; gap: 10px; border-radius: 0 8px 8px 0; margin-right: 10px; }
    .sidebar-link:hover, .sidebar-link.active { background: linear-gradient(90deg, rgba(37, 99, 235, 0.2), transparent); color: #60a5fa; border-left: 3px solid #2563eb; }
    .sidebar-link.active { font-weight: 500; }

    .main-content { margin-top: 70px; margin-left: 250px; padding: 20px; transition: all 0.3s ease; }
    .main-content.full-width { margin-left: 0; }

    .card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); padding: 25px; margin-bottom: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
    .form-group { margin-bottom: 20px; }
    .label { display: block; margin-bottom: 8px; font-weight: 500; color: #cbd5e1; }
    .form-control { width: 100%; padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; transition: all 0.3s ease; background: rgba(15, 23, 42, 0.6); color: #e2e8f0; }
    .form-control:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3); }

    .result-box { display: none; margin-top: 20px; }
    .keys-area { width: 100%; height: 200px; padding: 15px; border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 14px; background: rgba(15, 23, 42, 0.8); color: #10b981; margin-bottom: 10px; resize: none; }

    .rounded-circle { border-radius: 50%; }
    @media (max-width: 768px) { .sidebar { left: -250px; } .sidebar.active { left: 0; } .main-content { margin-left: 0; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-left">
        <button class="btn" id="sidebarToggle" style="width:auto;background:none;color:inherit"><i class="fas fa-bars"></i></button>
        <h1 class="header-title"><i class="fas fa-magic"></i><span>Bulk Generate Keys</span></h1>
      </div>
      <div class="header-actions"><img src="/logo.png" alt="Admin" width="40" height="40" class="rounded-circle" onerror="this.src='https://via.placeholder.com/40'"></div>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <ul class="sidebar-menu">
      <li class="sidebar-item"><a href="index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
      <li class="sidebar-item"><a href="admin.html" class="sidebar-link"><i class="fas fa-user-plus"></i><span>Add User</span></a></li>
      <li class="sidebar-item"><a href="bulk-generate.html" class="sidebar-link active"><i class="fas fa-key"></i><span>Bulk Generate</span></a></li>
      <li class="sidebar-item"><a href="dashboard.html" class="sidebar-link"><i class="fas fa-users-cog"></i><span>Manage Users</span></a></li>
      <li class="sidebar-item"><a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i><span>Settings</span></a></li>
    </ul>
  </aside>

  <main class="main-content" id="mainContent">
    <div class="container">
      <div class="card">
        <form id="bulkForm">
          <div class="form-group">
            <label class="label">Quantity</label>
            <input type="number" id="count" class="form-control" value="10" min="1" max="100" required>
          </div>
          <div class="form-group">
            <label class="label">Validity (Days)</label>
            <input type="number" id="days" class="form-control" value="30" min="1" required>
            <small style="color:var(--gray)">Automatic activation on first use (2099 logic).</small>
          </div>
          <div class="form-group">
            <label class="label">Prefix</label>
            <input type="text" id="prefix" class="form-control" value="dvamods">
          </div>
          <div class="form-group">
            <label class="label">Function</label>
            <select id="functionSelect" class="form-control">
              <option value="vip">VIP</option>
              <option value="free">Free</option>
            </select>
          </div>
          <button type="submit" class="btn" id="genBtn"><i class="fas fa-bolt"></i> Generate Now</button>
        </form>
      </div>

      <div class="card result-box" id="resultBox">
        <h2 style="font-size: 1.1rem; margin-bottom: 15px; color: #fff;">Generated Keys</h2>
        <textarea id="keysArea" class="keys-area" readonly></textarea>
        <button class="btn btn-success" id="copyBtn"><i class="fas fa-copy"></i> Copy All</button>
      </div>
    </div>
  </main>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { ref, update } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    sidebarToggle.onclick = () => { sidebar.classList.toggle('active'); mainContent.classList.toggle('full-width'); };

    const bulkForm = document.getElementById('bulkForm');
    const resultBox = document.getElementById('resultBox');
    const keysArea = document.getElementById('keysArea');
    const genBtn = document.getElementById('genBtn');

    bulkForm.onsubmit = async (e) => {
      e.preventDefault();
      genBtn.disabled = true;
      genBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';

      const count = parseInt(document.getElementById('count').value);
      const days = parseInt(document.getElementById('days').value);
      const prefix = document.getElementById('prefix').value.toLowerCase() || 'dvamods';
      const selectedFunction = document.getElementById('functionSelect').value;

      const pad = n => n.toString().padStart(2, '0');
      const h = Math.floor(days / 60);
      const m = days % 60;
      const validity2099 = `01-01-2099 ${pad(h)}:${pad(m)}`;

      const updates = {};
      const generatedOutput = [];
      const now = new Date();
      const rgtime = `${pad(now.getDate())}-${pad(now.getMonth()+1)}-${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

      const durationString = days === 1 ? '1day' : `${days}days`;
      const passwordToSave = selectedFunction;

      const usedCodes = new Set();
      for(let i=0; i<count; i++) {
        let randomCode;
        do {
          randomCode = Math.random().toString(36).substr(2, 6);
        } while (usedCodes.has(randomCode));
        usedCodes.add(randomCode);
        const key = `${prefix}-${durationString}-${randomCode}`;

        generatedOutput.push(`Usuário:${key} Senha:${passwordToSave}`);
        updates[`userinfo/${key}`] = {
          username: key,
          password: passwordToSave,
          status: 'active',
          validity: validity2099,
          device: 'null',
          access: '1',
          rgtime: rgtime,
          credit: '10'
        };
      }

      try {
        await update(ref(db), updates);
        keysArea.value = generatedOutput.join('\n');
        resultBox.style.display = 'block';
        alert(count + " Keys generated!");
      } catch(err) {
        alert("Error: " + err.message);
      } finally {
        genBtn.disabled = false;
        genBtn.innerHTML = '<i class="fas fa-bolt"></i> Generate Now';
      }
    };

    document.getElementById('copyBtn').onclick = () => {
      keysArea.select();
      document.execCommand('copy');
      alert("Copied!");
    };
  </script>
</body>
</html>
