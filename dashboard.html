<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --secondary: #1d4ed8;
      --accent: #06b6d4;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --dark: #0f172a;
      --gray: #94a3b8;
      --card-bg: rgba(30, 41, 59, 0.8);
      --border: rgba(99, 102, 241, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); color: #e2e8f0; line-height: 1.6; min-height: 100vh; }
    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }

    .header { background: linear-gradient(90deg, #1e293b, #312e81); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); padding: 15px 0; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
    .header .container { display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; align-items: center; gap: 15px; }
    .header-title { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 10px; color: #fff; }
    .header-actions { display: flex; align-items: center; gap: 15px; }

    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 6px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; border: none; background-color: transparent; color: #e2e8f0; }
    .btn-icon { width: 36px; height: 36px; border-radius: 50%; }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #7c3aed); color: #fff; }
    .btn-primary:hover { background: linear-gradient(135deg, #1d4ed8, #6d28d9); }
    .btn-success { background: linear-gradient(135deg, #10b981, #06b6d4); color: #fff; }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #ec4899); color: #fff; }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 0.85rem; }

    .sidebar { position: fixed; top: 70px; left: 0; bottom: 0; width: 250px; background: linear-gradient(180deg, #1e293b, #0f172a); box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3); transition: all 0.3s ease; z-index: 900; border-right: 1px solid var(--border); }
    .sidebar.active { left: -250px; }
    .sidebar-menu { list-style: none; padding: 15px 0; }
    .sidebar-item { margin-bottom: 5px; }
    .sidebar-link { display: flex; align-items: center; padding: 12px 20px; color: var(--gray); text-decoration: none; transition: all 0.3s ease; gap: 10px; border-radius: 0 8px 8px 0; margin-right: 10px; }
    .sidebar-link:hover, .sidebar-link.active { background: linear-gradient(90deg, rgba(37, 99, 235, 0.2), transparent); color: #60a5fa; border-left: 3px solid #2563eb; }
    .sidebar-link.active { font-weight: 500; }

    .main-content { margin-top: 70px; margin-left: 250px; padding: 20px; transition: all 0.3s ease; }
    .main-content.full-width { margin-left: 0; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-title { font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 10px; color: #fff; }
    .page-actions { display: flex; align-items: center; gap: 15px; }

    .search-box { position: relative; display: flex; align-items: center; }
    .search-box i { position: absolute; left: 12px; color: var(--gray); }
    .search-box input { padding: 8px 15px 8px 35px; border: 1px solid var(--border); border-radius: 8px; width: 200px; background: rgba(15, 23, 42, 0.6); color: #e2e8f0; transition: all 0.3s; }
    .search-box input:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3); }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); position: relative; overflow: hidden; border: 1px solid var(--border); }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card:nth-child(1)::before { background: linear-gradient(90deg, #2563eb, #06b6d4); }
    .stat-card:nth-child(2)::before { background: linear-gradient(90deg, #10b981, #06b6d4); }
    .stat-card:nth-child(3)::before { background: linear-gradient(90deg, #f59e0b, #ef4444); }
    .stat-card h3 { font-size: 0.9rem; color: var(--gray); margin-bottom: 10px; }
    .stat-card p { font-size: 1.75rem; font-weight: 600; color: #fff; }
    .stat-icon { position: absolute; right: 20px; top: 20px; font-size: 2.5rem; opacity: 0.15; color: #60a5fa; }

    .card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }

    .bulk-actions { background: rgba(37, 99, 235, 0.1); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; display: none; align-items: center; gap: 15px; }
    .bulk-actions.active { display: flex; }
    .selected-count { font-weight: 600; color: #60a5fa; margin-right: 10px; }

    .user-list { display: flex; flex-direction: column; gap: 15px; }
    .loading, .no-users { padding: 20px; text-align: center; color: var(--gray); }

    .user-card { background: rgba(15, 23, 42, 0.6); border-radius: 10px; padding: 15px; border: 1px solid var(--border); display: flex; gap: 15px; align-items: flex-start; transition: 0.3s; }
    .user-card.selected { background: rgba(37, 99, 235, 0.1); border-color: #2563eb; }
    .user-checkbox { width: 20px; height: 20px; margin-top: 5px; cursor: pointer; accent-color: #2563eb; }
    .user-main { flex: 1; }

    .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .user-header h3 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .user-status { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; padding: 4px 8px; border-radius: 20px; }
    .user-status.active { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .user-status.inactive { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .user-status.stock { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .user-status i { font-size: 0.5rem; }

    .user-details { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
    .detail-group { margin-bottom: 10px; }
    .detail-group label { display: block; font-size: 0.85rem; color: var(--gray); margin-bottom: 5px; }

    .password-container { position: relative; }
    .password-container input { padding-right: 35px; }
    .toggle-password { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray); }

    .form-control { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; background: rgba(15, 23, 42, 0.6); color: #e2e8f0; transition: all 0.3s; }
    .form-control:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3); }
    .form-control:disabled { background: rgba(15, 23, 42, 0.3); cursor: not-allowed; opacity: 0.6; }

    .user-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }

    .alert { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); z-index: 1100; animation: slideIn 0.3s ease forwards; }
    .alert-success { background: linear-gradient(135deg, #10b981, #06b6d4); color: #fff; }
    .alert-error { background: linear-gradient(135deg, #ef4444, #ec4899); color: #fff; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .rounded-circle { border-radius: 50%; }
    .maintenance-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: 500; border: 1px solid rgba(245, 158, 11, 0.3); }

    @media (max-width: 768px) {
      .sidebar { left: -250px; } .sidebar.active { left: 0; } .main-content { margin-left: 0; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 15px; }
      .page-actions { width: 100%; flex-direction: column; gap: 10px; }
      .search-box input { width: 100%; }
      .user-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-left">
        <button class="btn btn-icon" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <h1 class="header-title"><i class="fas fa-users-cog"></i><span>User Management</span></h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-icon"><i class="fas fa-bell"></i></button>
        <img src="/logo.png" alt="Admin" width="40" height="40" class="rounded-circle" onerror="this.src='https://via.placeholder.com/40'">
      </div>
    </div>
  </header>

  <aside class="sidebar" id="sidebar">
    <ul class="sidebar-menu">
      <li class="sidebar-item"><a href="index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
      <li class="sidebar-item"><a href="admin.html" class="sidebar-link"><i class="fas fa-user-plus"></i><span>Add User</span></a></li>
      <li class="sidebar-item"><a href="bulk-generate.html" class="sidebar-link"><i class="fas fa-key"></i><span>Bulk Generate</span></a></li>
      <li class="sidebar-item"><a href="dashboard.html" class="sidebar-link active"><i class="fas fa-users-cog"></i><span>Manage Users</span></a></li>
      <li class="sidebar-item"><a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i><span>Settings</span></a></li>
    </ul>
  </aside>

  <main class="main-content" id="mainContent">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title"><i class="fas fa-users-cog"></i> User Management</h1>
        <div class="page-actions">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search users..." oninput="filterUsers()">
          </div>
          <button class="btn btn-primary" id="selectAllBtn"><i class="fas fa-check-square"></i> Select All</button>
        </div>
      </div>

      <div class="bulk-actions" id="bulkActions">
        <span class="selected-count" id="selectedCountText">0 selected</span>
        <button class="btn btn-danger btn-sm" id="bulkDeleteBtn"><i class="fas fa-trash"></i> Delete</button>
        <button class="btn btn-warning btn-sm" id="bulkDeactivateBtn"><i class="fas fa-ban"></i> Deactivate</button>
        <button class="btn btn-success btn-sm" id="bulkActivateBtn"><i class="fas fa-check"></i> Activate</button>
      </div>

      <div id="maintenanceWarning" class="maintenance-warning" style="display: none;">
        <i class="fas fa-exclamation-triangle"></i> Site is currently in Maintenance Mode.
      </div>

      <div class="stats-grid">
        <div class="stat-card"><h3>Total Users</h3><p id="totalUsers">0</p><i class="fas fa-users stat-icon"></i></div>
        <div class="stat-card"><h3>Active Users</h3><p id="activeUsers">0</p><i class="fas fa-user-check stat-icon"></i></div>
        <div class="stat-card"><h3>In Stock</h3><p id="stockUsers">0</p><i class="fas fa-box stat-icon"></i></div>
      </div>

      <div class="card">
        <div id="userList" class="user-list">
          <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading users...</div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { ref, update, remove, onValue } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    sidebarToggle.addEventListener('click', () => { sidebar.classList.toggle('active'); mainContent.classList.toggle('full-width'); });

    const userListEl = document.getElementById('userList');
    const bulkActions = document.getElementById('bulkActions');
    const selectedCountText = document.getElementById('selectedCountText');
    const selectAllBtn = document.getElementById('selectAllBtn');
    let allUsers = {};
    let selectedUsers = new Set();

    onValue(ref(db, "userinfo"), (snapshot) => {
        allUsers = snapshot.val() || {};
        renderUsers(allUsers);
        updateStats(allUsers);
    });

    function renderUsers(users) {
      const search = document.getElementById('searchInput').value.toLowerCase();
      userListEl.innerHTML = '';
      const filteredKeys = Object.keys(users).filter(k => k.toLowerCase().includes(search));

      if (filteredKeys.length === 0) { userListEl.innerHTML = '<div class="no-users">No users found.</div>'; return; }

      filteredKeys.forEach((username) => {
        const user = users[username];
        const isStock = user.validity && user.validity.startsWith("01-01-2099");
        let valDisplay = user.validity;
        let statusClass = user.status;
        let statusLabel = user.status;

        if (isStock) {
            const timePart = user.validity.split(' ')[1];
            const [h, m] = timePart.split(':').map(Number);
            valDisplay = `STOCK (${(h*60)+m} days)`;
            statusClass = 'stock';
            statusLabel = 'Stock';
        }

        const userCard = document.createElement('div');
        userCard.className = `user-card ${selectedUsers.has(username) ? 'selected' : ''}`;
        userCard.innerHTML = `
          <input type="checkbox" class="user-checkbox" ${selectedUsers.has(username) ? 'checked' : ''} onchange="toggleSelect('${username}')">
          <div class="user-main">
            <div class="user-header">
                <h3>${username}</h3>
                <span class="user-status ${statusClass}"><i class="fas fa-circle"></i> ${statusLabel}</span>
            </div>
            <div class="user-details">
                <div class="detail-group">
                  <label>Password</label>
                  <div class="password-container">
                    <input type="password" id="password-${username}" value="${user.password || ''}" class="form-control">
                    <button class="btn btn-icon toggle-password" onclick="togglePasswordVisibility('password-${username}', this)"><i class="fas fa-eye"></i></button>
                  </div>
                </div>
                <div class="detail-group">
                  <label>Status</label>
                  <select id="status-${username}" class="form-control">
                    <option value="active" ${user.status === 'active' ? 'selected' : ''}>Active</option>
                    <option value="inactive" ${user.status === 'inactive' ? 'selected' : ''}>Inactive</option>
                  </select>
                </div>
                <div class="detail-group">
                  <label>Validity</label>
                  <input type="text" id="validity-${username}" value="${valDisplay}" class="form-control" ${isStock ? 'disabled' : ''}>
                </div>
                <div class="detail-group">
                  <label>Access</label>
                  <select id="access-${username}" class="form-control">
                    <option value="1" ${user.access === '1' ? 'selected' : ''}>1 Device</option>
                    <option value="∞" ${user.access === '∞' ? 'selected' : ''}>Unlimited</option>
                  </select>
                </div>
                <div class="detail-group">
                  <label>Seller's Credit</label>
                  <select id="credit-${username}" class="form-control">
                    <option value="10" ${user.credit == '10' ? 'selected' : ''}>10 Credits</option>
                    <option value="20" ${user.credit == '20' ? 'selected' : ''}>20 Credits</option>
                    <option value="30" ${user.credit == '30' ? 'selected' : ''}>30 Credits</option>
                  </select>
                </div>
                <div class="detail-group">
                  <label>Registered</label>
                  <input type="text" value="${user.rgtime || 'N/A'}" class="form-control" disabled>
                </div>
            </div>
            <div class="user-actions">
                <button class="btn btn-success btn-sm" onclick="updateUser('${username}')"><i class="fas fa-save"></i> Update</button>
                <button class="btn btn-danger btn-sm" onclick="deleteUser('${username}')"><i class="fas fa-trash"></i> Delete</button>
            </div>
          </div>
        `;
        userListEl.appendChild(userCard);
      });
      updateBulkBar();
    }

    window.toggleSelect = (username) => {
        if (selectedUsers.has(username)) selectedUsers.delete(username);
        else selectedUsers.add(username);
        renderUsers(allUsers);
    };

    function updateBulkBar() {
        if (selectedUsers.size > 0) { bulkActions.classList.add('active'); selectedCountText.textContent = `${selectedUsers.size} selected`; }
        else { bulkActions.classList.remove('active'); }
    }

    selectAllBtn.onclick = () => {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const visibleKeys = Object.keys(allUsers).filter(k => k.toLowerCase().includes(search));
        if (selectedUsers.size === visibleKeys.length) selectedUsers.clear();
        else visibleKeys.forEach(k => selectedUsers.add(k));
        renderUsers(allUsers);
    };

    function updateStats(users) {
      let total = 0, active = 0, stock = 0;
      Object.values(users).forEach(user => {
        total++;
        if (user.validity && user.validity.startsWith("01-01-2099")) stock++;
        else if (user.status === 'active') active++;
      });
      document.getElementById('totalUsers').textContent = total;
      document.getElementById('activeUsers').textContent = active;
      document.getElementById('stockUsers').textContent = stock;
    }

    window.togglePasswordVisibility = function(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
    };

    window.updateUser = function(username) {
        const password = document.getElementById(`password-${username}`).value;
        const status = document.getElementById(`status-${username}`).value;
        const access = document.getElementById(`access-${username}`).value;
        const credit = document.getElementById(`credit-${username}`).value;
        const updates = { password, status, access, credit };
        const valInput = document.getElementById(`validity-${username}`);
        if (!valInput.disabled) updates.validity = valInput.value;
        update(ref(db, `userinfo/${username}`), updates).then(() => showAlert(`User ${username} updated!`, 'success'));
    };

    window.deleteUser = function(username) {
        if (confirm(`Delete ${username}?`)) {
          remove(ref(db, `userinfo/${username}`)).then(() => showAlert(`User ${username} deleted!`, 'success'));
        }
    };

    document.getElementById('bulkDeleteBtn').onclick = async () => {
        if (confirm(`Delete ${selectedUsers.size} users?`)) {
            for (let key of selectedUsers) await remove(ref(db, `userinfo/${key}`));
            selectedUsers.clear();
        }
    };
    document.getElementById('bulkActivateBtn').onclick = async () => {
        const updates = {};
        selectedUsers.forEach(key => updates[`userinfo/${key}/status`] = 'active');
        await update(ref(db), updates); selectedUsers.clear();
    };
    document.getElementById('bulkDeactivateBtn').onclick = async () => {
        const updates = {};
        selectedUsers.forEach(key => updates[`userinfo/${key}/status`] = 'inactive');
        await update(ref(db), updates); selectedUsers.clear();
    };

    window.filterUsers = () => renderUsers(allUsers);

    function showAlert(message, type) {
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.innerHTML = `<span>${message}</span>`;
      document.body.appendChild(alert);
      setTimeout(() => alert.remove(), 3000);
    }
  </script>
</body>
</html>
